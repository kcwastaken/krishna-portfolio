<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna Chaudhary | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav" aria-label="Main navigation">
        <a class="nav-link" href="index.html">HOME</a>
        <a class="nav-link" href="index.html#lore">LORE</a>
        <a class="nav-link" href="index.html#quests">QUESTS</a>
        <a class="nav-link" href="game.html">EASTER EGG</a>
        <a class="nav-link" href="contact.html">CONTACT ME</a>
    </nav>

    <main class="page-shell">
        <section class="content-panel contact-panel">
            <h1 class="page-title">CONTACT ME</h1>
            <p class="section-copy">Leave a message and I will answer from the next level up.</p>
            <form class="contact-form" action="https://formspree.io/f/your-form-id" method="POST">
                <label class="field">
                    <span>Name</span>
                    <input type="text" name="name" placeholder="Enter your name" required>
                </label>
                <label class="field">
                    <span>Email</span>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </label>
                <label class="field">
                    <span>Message</span>
                    <textarea name="message" rows="6" placeholder="Type your message" required></textarea>
                </label>
                <button class="send-btn" type="submit">SEND</button>
            </form>
        </section>
    </main>
</body>
</html>
